name: Update NVBeacon Cask

on:
  repository_dispatch:
    types:
      - nvbeacon_release_published
  workflow_dispatch:
    inputs:
      version:
        description: NVBeacon version without the leading v
        required: true
        type: string
      dmg_url:
        description: Full URL to the release DMG asset
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-cask:
    runs-on: ubuntu-latest

    steps:
      - name: Check out tap repository
        uses: actions/checkout@v4

      - name: Resolve release metadata
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "repository_dispatch" ]]; then
            echo "VERSION=${{ github.event.client_payload.version }}" >> "$GITHUB_ENV"
            echo "DMG_URL=${{ github.event.client_payload.dmg_url }}" >> "$GITHUB_ENV"
            echo "SOURCE_TAG=${{ github.event.client_payload.tag }}" >> "$GITHUB_ENV"
          else
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
            echo "DMG_URL=${{ inputs.dmg_url }}" >> "$GITHUB_ENV"
            echo "SOURCE_TAG=v${{ inputs.version }}" >> "$GITHUB_ENV"
          fi

      - name: Validate release metadata
        shell: bash
        run: |
          : "${VERSION:?Missing VERSION}"
          : "${DMG_URL:?Missing DMG_URL}"

      - name: Update cask file
        run: |
          python3 ./scripts/update_nvbeacon_cask.py \
            --version "$VERSION" \
            --dmg-url "$DMG_URL" \
            --cask-path Casks/nvbeacon.rb

      - name: Validate cask syntax
        run: ruby -c Casks/nvbeacon.rb

      - name: Commit and push changes
        shell: bash
        run: |
          if git diff --quiet -- Casks/nvbeacon.rb; then
            echo "No cask changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/nvbeacon.rb
          git commit -m "Update NVBeacon cask to ${VERSION}"
          git push
